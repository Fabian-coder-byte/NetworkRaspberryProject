version: '3.8'

# network_mode: host permette al backend di scansionare la rete LAN reale.
# Pro: nmap vede tutti i dispositivi, nessuna configurazione IP aggiuntiva.
# Contro: il container condivide la rete dell'host, nessun isolamento di rete Docker.
# Soluzione adottata: host mode per backend + nginx proxy per frontend.

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: network-map-backend
    restart: unless-stopped
    network_mode: host
    volumes:
      - ./data:/app/data
    environment:
      - NODE_ENV=production
      - PORT=3001
      - DB_PATH=/app/data/network-map.db
      - SCAN_INTERVAL_MINUTES=5
    cap_add:
      - NET_RAW
      - NET_ADMIN

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: network-map-frontend
    restart: unless-stopped
    network_mode: host
    depends_on:
      - backend
