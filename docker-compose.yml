services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: network-map-backend
    restart: unless-stopped
    network_mode: host
    volumes:
      - ./data:/app/data
    environment:
      - NODE_ENV=production
      - PORT=7010
      - DB_PATH=/app/data/network-map.db
      - SCAN_INTERVAL_MINUTES=5
    cap_add:
      - NET_RAW
      - NET_ADMIN

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: network-map-frontend
    restart: unless-stopped
    network_mode: host
    depends_on:
      - backend
